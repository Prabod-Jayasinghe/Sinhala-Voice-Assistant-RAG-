name: CI — Sinhala Voice Assistant

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        env:
          # Use placeholder keys in CI — tests use mocked services
          GROQ_API_KEY: "ci_placeholder_key"
          GEMINI_API_KEY: "ci_placeholder_key"
          TTS_VOICE: "si-LK-ThiliniNeural"
        run: |
          cd tests
          python -m pytest test_api.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/ --select=E,F,W --ignore=E501
